<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculateur Diamètre d'Enroulement - Adam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --rds-bleu: #25737d;
      --rds-orange: #ff7200;
      --rds-gris: #ffffff;
      --rds-text: #1a1a1a;
      --rds-input-bg: #f9f9f9;
      --rds-border: #eeeeee;
    }

    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: var(--rds-gris);
      color: var(--rds-text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    .panneau-calcul {
      width: 100%;
      max-width: 380px;
      padding: 40px;
      background: #ffffff;
    }

    h2 { 
      font-size: 1.1rem;
      font-weight: 500;
      text-align: left;
      color: var(--rds-text);
      margin: 0 0 40px 0;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid var(--rds-border);
      padding-bottom: 15px;
    }

    .groupe {
      margin-bottom: 25px;
    }

    label { 
      display: block; 
      font-size: 0.7rem;
      font-weight: 400;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    select, input { 
      width: 100%;
      box-sizing: border-box;
      padding: 12px 0;
      border: none;
      border-bottom: 1px solid var(--rds-border);
      background: transparent;
      font-size: 0.9rem;
      color: var(--rds-text);
      outline: none;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
    }

    select:focus, input:focus {
      border-bottom-color: var(--rds-orange);
    }

    button { 
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      border: 1px solid var(--rds-text);
      background: transparent;
      color: var(--rds-text);
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: var(--rds-text);
      color: #fff;
    }

    /* Zone de Résultat - Style Minimaliste */
    .zone-resultat {
      margin-top: 40px;
      padding-top: 25px;
      border-top: 1px solid var(--rds-border);
      display: none; 
      animation: fadeIn 0.5s ease;
    }

    .valeur-diametre {
      display: block;
      font-size: 2rem;
      font-weight: 300;
      color: var(--rds-text);
      margin: 10px 0;
    }

    .valeur-diametre span {
        color: var(--rds-orange);
        font-weight: 500;
    }

    .notice {
      font-size: 0.75rem;
      line-height: 1.6;
      color: #999;
      margin: 15px 0 0 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Chrome, Safari, Edge, Opera - Enlever les flèches input number */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>
<body>

<div class="panneau-calcul">
  <h2>Enroulement</h2>
  
  <div class="groupe">
    <label for="tubeEnroulement">Tube d'enroulement nu</label>
    <select id="tubeEnroulement">
      <option value="4">Tube Ø 40 mm (4 cm)</option>
      <option value="5">Tube Ø 50 mm (5 cm)</option>
      <option value="6">Tube Ø 60 mm (6 cm)</option>
      <option value="7">Tube Ø 70 mm (7 cm)</option>
      <option value="8">Tube Ø 80 mm (8 cm)</option>
    </select>
  </div>
  
  <div class="groupe">
    <label for="qualite">Qualité de toile</label>
    <select id="qualite">
      <option value="acrylique">Acrylique (1,6 mm)</option>
      <option value="soltis">Soltis 92 (0,5 mm)</option>
    </select>
  </div>
  
  <div class="groupe">
    <label for="avancee">Avancée totale (cm)</label>
    <input type="number" id="avancee" placeholder="Ex : 300" min="0">
  </div>
  
  <button type="button" onclick="calculerDiametre()">Calculer</button>
  
  <div id="resultat" class="zone-resultat">
    <label>Diamètre final estimé</label>
    <span class="valeur-diametre"><span id="valeur-num">--</span> cm</span>
    <p class="notice">
      Prévoir une marge de sécurité de +10% dans votre coffre.
    </p>
  </div>
</div>

<script>
  function calculerDiametre() {
    let dTube = parseFloat(document.getElementById('tubeEnroulement').value);
    let qualite = document.getElementById('qualite').value;
    let L = parseFloat(document.getElementById('avancee').value);

    if (isNaN(L) || L <= 0) {
      return;
    }

    let t = (qualite === "acrylique") ? 0.16 : 0.05;

    let dFinal = Math.sqrt(Math.pow(dTube, 2) + (4 * t * L) / Math.PI);
    dFinal = dFinal.toFixed(1);

    document.getElementById('resultat').style.display = 'block';
    document.getElementById('valeur-num').innerText = dFinal;
  }

  // Protection Clic Droit & Touches F12
  document.addEventListener('contextmenu', e => e.preventDefault()); 
  document.onkeydown = e => { 
      if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) 
      return false; 
  };
</script>

</body>
</html>
