<div class="rds-expert-force-fullwidth">
    <div id="rds-hub-container" class="rds-cards-content-centered">
        <div class="rds-expert-header">
            <h2>Boîte à Outils Adam</h2>
        </div>
        <div class="rds-cards-grid" id="dynamic-cards-container">
            <div style="text-align:center; padding: 20px; color: #64748b;">Initialisation des outils...</div>
        </div>
    </div>

    <div id="rds-app-viewer" style="display:none;">
        <div class="rds-app-bar">
            <button onclick="closeApp()" class="rds-back-button">
                <span style="margin-right:8px;">←</span> Retour aux outils
            </button>
            <div id="rds-app-title-container">
                <span id="rds-app-title">Chargement...</span>
                <small>Outil de calcul Rue du Store</small>
            </div>
        </div>
        <iframe id="rds-app-iframe" src="" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<script>
// PROTECTION : Désactivation du clic droit
document.addEventListener('contextmenu', event => event.preventDefault());

const githubBaseUrl = "https://rds-adam.github.io/app/";
const hubContainer = document.getElementById('rds-hub-container');
const appViewer = document.getElementById('rds-app-viewer');
const appIframe = document.getElementById('rds-app-iframe');
const appTitle = document.getElementById('rds-app-title');

/**
 * Ouvre l'outil dans l'Iframe
 */
function openApp(fileName, cleanName) {
    hubContainer.style.display = 'none';
    appViewer.style.display = 'block';
    appTitle.innerText = cleanName;
    appIframe.src = githubBaseUrl + fileName;
    
    // Remonte en haut de page pour l'outil
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

/**
 * Ferme l'outil et revient à la grille
 */
function closeApp() {
    appIframe.src = ""; // Coupe le processus de l'iframe
    appViewer.style.display = 'none';
    hubContainer.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

/**
 * Génère les cartes dynamiquement via l'API GitHub
 */
async function generateCards() {
    const container = document.getElementById('dynamic-cards-container');
    
    const getIcon = (name) => {
        const n = name.toLowerCase();
        if (n.includes('tourne')) return '🚚';
        if (n.includes('pix') || n.includes('cote')) return '📐';
        if (n.includes('pose')) return '🛠️';
        if (n.includes('panachage')) return '🎨';
        if (n.includes('temperature') || n.includes('thermique')) return '🌡️';
        if (n.includes('enroulement')) return '🔄';
        if (n.includes('trapeze') || n.includes('triangle')) return '📐';
        return '📄';
    };

    try {
        const response = await fetch('https://api.github.com/repos/RDS-Adam/app/contents/');
        const files = await response.json();

        // Filtrage des fichiers selon ta capture écran
        const htmlFiles = files.filter(file => 
            file.name.endsWith('.html') && 
            !file.name.includes('index-rds-2026-secure') &&
            !file.name.includes('robots.txt')
        );

        container.innerHTML = "";

        htmlFiles.forEach(file => {
            const cleanName = decodeURIComponent(file.name)
                .replace('.html', '')
                .replace(/-/g, ' ')
                .replace(/_/g, ' ');

            const icon = getIcon(cleanName.toLowerCase());

            const cardHtml = `
                <div class="rds-card-item" onclick="openApp('${file.name}', '${cleanName}')">
                    <div class="rds-card-main">
                        <span class="rds-card-icon">${icon}</span>
                        <strong>${cleanName}</strong>
                        <p>Outil d'aide à la vente</p>
                    </div>
                    <div class="rds-card-footer">Lancer l'application →</div>
                </div>
            `;
            container.innerHTML += cardHtml;
        });
    } catch (error) {
        console.error("GitHub API Error:", error);
        container.innerHTML = "<p>Impossible de charger la liste des outils. Vérifiez la connexion.</p>";
    }
}

// Lancement
generateCards();
</script>
