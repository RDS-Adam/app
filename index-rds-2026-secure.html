<div class="rds-expert-force-fullwidth" id="rds-main-wrapper">
    <div id="rds-hub-container" class="rds-cards-content-centered">
        <div class="rds-expert-header">
            <h2>Boîte à Outils Adam</h2>
        </div>
        <div class="rds-cards-grid" id="dynamic-cards-container">
            <div style="text-align:center; padding: 20px; color: #64748b;">Chargement de tous les outils...</div>
        </div>
    </div>

    <div id="rds-app-viewer" style="display:none;">
        <div class="rds-app-bar">
            <button onclick="closeApp()" class="rds-back-button">← Retour</button>
            <div id="rds-app-title-container">
                <span id="rds-app-title">Chargement...</span>
            </div>
        </div>
        <iframe id="rds-app-iframe" src="" frameborder="0"></iframe>
    </div>
</div>

<script>
document.addEventListener('contextmenu', event => event.preventDefault());

const githubBaseUrl = "https://rds-adam.github.io/app/";
const hubContainer = document.getElementById('rds-hub-container');
const appViewer = document.getElementById('rds-app-viewer');
const appIframe = document.getElementById('rds-app-iframe');
const appTitle = document.getElementById('rds-app-title');
const mainWrapper = document.getElementById('rds-main-wrapper');

function openApp(fileName, cleanName) {
    hubContainer.style.display = 'none';
    appViewer.style.display = 'block';
    appTitle.innerText = cleanName;
    appIframe.src = githubBaseUrl + fileName;
    
    // Désactiver le scroll sur la page parente quand l'app est ouverte
    document.body.style.overflow = 'hidden'; 
    window.scrollTo(0, 0);
}

function closeApp() {
    appIframe.src = "";
    appViewer.style.display = 'none';
    hubContainer.style.display = 'block';
    // Réactiver le scroll quand on revient au menu
    document.body.style.overflow = 'auto'; 
}

async function generateCards() {
    const container = document.getElementById('dynamic-cards-container');
    
    const getIcon = (name) => {
        const n = name.toLowerCase();
        if (n.includes('tourne')) return '🚚';
        if (n.includes('pix') || n.includes('cote')) return '📐';
        if (n.includes('pose')) return '🛠️';
        if (n.includes('panachage')) return '🎨';
        if (n.includes('temperature') || n.includes('thermique')) return '🌡️';
        if (n.includes('enroulement')) return '🔄';
        if (n.includes('trapeze') || n.includes('triangle')) return '📐';
        return '📄';
    };

    try {
        const response = await fetch('https://api.github.com/repos/RDS-Adam/app/contents/');
        const items = await response.json();

        container.innerHTML = "";

        items.forEach(item => {
            // On accepte les fichiers .html OU les dossiers (pour ne rien rater)
            const isHtml = item.name.endsWith('.html');
            const isFolder = item.type === 'dir';
            const isIgnored = item.name.includes('index-rds-2026-secure') || item.name.includes('robots.txt');

            if ((isHtml || isFolder) && !isIgnored) {
                const cleanName = decodeURIComponent(item.name)
                    .replace('.html', '')
                    .replace(/-/g, ' ')
                    .replace(/_/g, ' ');

                // Si c'est un dossier, on cherche l'index dedans, sinon le fichier direct
                const linkTarget = isFolder ? `${item.name}/index.html` : item.name;

                const cardHtml = `
                    <div class="rds-card-item" onclick="openApp('${linkTarget}', '${cleanName}')">
                        <div class="rds-card-main">
                            <span class="rds-card-icon">${getIcon(cleanName)}</span>
                            <strong>${cleanName}</strong>
                            <p>Outil de calcul</p>
                        </div>
                        <div class="rds-card-footer">Lancer →</div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            }
        });
    } catch (error) {
        container.innerHTML = "<p>Erreur lors du chargement des outils.</p>";
    }
}

generateCards();
</script>

    article, .entry-content, .post-content, .site-main { width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; }

    .rds-cards-content-centered { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .rds-expert-header h2 { color: #33757e; font-size: 2rem; border-bottom: 4px solid #f2711c; padding-bottom: 10px; display: inline-block; text-transform: uppercase; }
