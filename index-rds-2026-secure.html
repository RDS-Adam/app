<div class="rds-expert-force-fullwidth">
    <div class="rds-cards-content-centered">
        <div class="rds-expert-header">
            <h2>Boîte à Outils Adam</h2>
        </div>
        
        <div class="rds-cards-grid" id="dynamic-cards-container">
            <div style="text-align:center; padding: 20px; color: #64748b;">Chargement des outils...</div>
        </div>
    </div>
</div>

<script>
async function generateCards() {
    const container = document.getElementById('dynamic-cards-container');
    const baseUrl = "https://rds-adam.github.io/app/";
    
    // Configuration des icônes par défaut ou selon mots-clés
    const getIcon = (name) => {
        if (name.includes('tourne')) return '🚚';
        if (name.includes('pix') || name.includes('cote')) return '📐';
        if (name.includes('pose')) return '🛠️';
        if (name.includes('panachage')) return '🎨';
        if (name.includes('temperature') || name.includes('thermique')) return '🌡️';
        if (name.includes('enroulement')) return '🔄';
        return '📄'; // Icône par défaut
    };

    try {
        // Interroge l'API GitHub pour lister les fichiers
        const response = await fetch('https://api.github.com/repos/RDS-Adam/app/contents/');
        const files = await response.json();

        // On filtre : fichiers HTML uniquement, et on ignore l'index lui-même et robots.txt
        const htmlFiles = files.filter(file => 
            file.name.endsWith('.html') && 
            !file.name.includes('index-rds-2026-secure')
        );

        container.innerHTML = ""; // On vide le message de chargement

        htmlFiles.forEach(file => {
            // Formatage du nom : on enlève .html, on remplace les tirets/codes par des espaces
            const cleanName = decodeURIComponent(file.name)
                .replace('.html', '')
                .replace(/-/g, ' ')
                .replace(/_/g, ' ');

            const icon = getIcon(cleanName.toLowerCase());

            const cardHtml = `
                <a href="${baseUrl}${file.name}" class="rds-card-item" target="_blank" rel="noopener noreferrer">
                    <div class="rds-card-main">
                        <span class="rds-card-icon">${icon}</span>
                        <strong>${cleanName}</strong>
                        <span>Outil de calcul Rue du Store</span>
                    </div>
                    <div class="rds-card-footer">Démarrer →</div>
                </a>
            `;
            container.innerHTML += cardHtml;
        });
    } catch (error) {
        console.error("Erreur GitHub API:", error);
        container.innerHTML = "<p>Impossible de charger les cartes. Vérifiez la connexion.</p>";
    }
}

// Lancement automatique
generateCards();
</script>
