<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificateur de Tournées - Rue du Store</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAGugAD5jwy5zeDaKn3oL5NllbqzYqhimw&libraries=places"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f3f4f6; color: #1f2937; padding-bottom: 50px; }
    
    .container { max-width: 1050px; margin: 30px auto; padding: 0 20px; }
    .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #e5e7eb; position: relative; }
    .card-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #111827; border-bottom: 2px solid #f3f4f6; padding-bottom: 10px; }
    
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #4b5563; }
    input[type="text"], input[type="date"], select, input[type="time"], input[type="number"], textarea { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s; }
    input[type="text"]:focus, select:focus, textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
    
    .btn { cursor: pointer; padding: 10px 16px; border-radius: 6px; font-weight: 600; font-size: 14px; border: none; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; padding: 6px 10px; }
    
    .btn-mail { background: #eff6ff; color: #2563eb; border: 1px solid #dbeafe; font-size: 12px; padding: 6px 10px; font-weight: 600; cursor: pointer; border-radius: 6px; }
    .btn-mail:hover { background: #dbeafe; }
    .btn-cal { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; font-size: 12px; padding: 6px 10px; font-weight: 600; cursor: pointer; border-radius: 6px; margin-left: 5px; }
    .btn-cal:hover { background: #dcfce7; }
    .btn-del-lunch { color: #dc2626; background: #fee2e2; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; }

    .job-block { background: #f9fafb; border: 1px solid #e5e7eb; padding: 15px; border-radius: 8px; margin-bottom: 15px; position: relative; }
    .remove-job { position: absolute; top: 15px; right: 15px; }

    /* Map container style */
    #map-container { width: 100%; height: 450px; border-radius: 12px; border: 1px solid #e5e7eb; margin-bottom: 25px; overflow: hidden; background: #e5e7eb; display: flex; align-items: center; justify-content: center; color: #6b7280;}

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 12px; color: #6b7280; font-weight: 600; border-bottom: 2px solid #e5e7eb; }
    td { padding: 12px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
    .lunch-row { background: #fffbeb !important; }
    .lunch-row td { color: #92400e; }
    
    .draggable-row { cursor: grab; transition: background 0.2s; }
    .draggable-row:active { cursor: grabbing; background: #eff6ff !important; }
    .drag-handle { cursor: grab; padding-right: 10px; color: #9ca3af; font-size: 18px; user-select: none; }
    .drag-over { border-top: 2px dashed #3b82f6; }

    .transit-step { font-size: 11px; color: #4b5563; background: #f3f4f6; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 4px; margin-right: 4px; border: 1px solid #e5e7eb; }
    .transit-detail-row td { background-color: #f8fafc; border-bottom: 2px solid #e2e8f0; }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .modal-content { background: white; padding: 25px; border-radius: 12px; width: 450px; max-width: 90%; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

    @media print { 
      .no-print { display: none !important; } 
      body { background: white; padding: 0; }
      .container { margin: 0; padding: 0; max-width: 100%; }
      .card { border: none; box-shadow: none; padding: 0; margin-bottom: 10px; }
      .print-only { display: inline !important; }
    }
    .print-only { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const timeToMinutes = (hhmm) => { const [h, m] = hhmm.split(/[h:]/).map(Number); return h * 60 + m; };
    const minutesToTime = (total) => {
      const h = Math.floor(Math.round(total) / 60) % 24;
      const m = Math.round(total) % 60;
      return `${String(h).padStart(2, "0")}h${String(m).padStart(2, "0")}`;
    };

    const getVagueTimeLabel = (timeStr) => {
      if(!timeStr) return "dans la journée";
      const [h, m] = timeStr.split('h').map(Number);
      const timeDecimal = h + (m / 60);
      
      if (timeDecimal < 13) return "dans la matinée";
      if (timeDecimal >= 13 && timeDecimal < 15) return "en début d'après-midi";
      return "dans l'après-midi";
    };

    function GoogleAddressInput({ value, onChange, onPick, placeholder }) {
      const inputRef = useRef(null);
      const autocompleteRef = useRef(null);
      
      const callbacks = useRef({ onChange, onPick });
      useEffect(() => { callbacks.current = { onChange, onPick }; }, [onChange, onPick]);

      useEffect(() => {
        if (window.google && inputRef.current && !autocompleteRef.current) {
          autocompleteRef.current = new window.google.maps.places.Autocomplete(inputRef.current, { fields: ["formatted_address", "geometry"] });
          autocompleteRef.current.addListener("place_changed", () => {
            const place = autocompleteRef.current.getPlace();
            if (place.geometry) {
              const lat = place.geometry.location.lat();
              const lon = place.geometry.location.lng();
              const label = place.formatted_address;
              callbacks.current.onChange(label);
              callbacks.current.onPick({ label, lat, lon });
            }
          });
        }
      }, []);

      const handleKeyDown = (e) => { if (e.key === 'Enter') e.preventDefault(); };

      return (
        <input ref={inputRef} type="text" value={value || ""} onChange={(e) => onChange(e.target.value)} onKeyDown={handleKeyDown} placeholder={placeholder} />
      );
    }

    // --- COMPOSANT CARTE 100% GOOGLE MAPS ---
    function GoogleMapComponent({ points, routeGeometry }) {
      const mapDivRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const markersRef = useRef([]);
      const polylineRef = useRef(null);

      useEffect(() => {
        if (!window.google) return;

        // Initialisation de la carte
        if (!mapInstanceRef.current) {
          mapInstanceRef.current = new window.google.maps.Map(mapDivRef.current, {
            center: { lat: 46.6, lng: 2.2 },
            zoom: 5,
            streetViewControl: false,
            mapTypeControl: false,
            fullscreenControl: true,
          });
        }

        const map = mapInstanceRef.current;

        // Nettoyage des éléments
        markersRef.current.forEach(m => m.setMap(null));
        markersRef.current = [];
        if (polylineRef.current) polylineRef.current.setMap(null);

        const activePoints = points.filter(p => p.lat && p.lon);
        if (activePoints.length === 0) return;

        const bounds = new window.google.maps.LatLngBounds();

        // Marqueurs
        activePoints.forEach((p, index) => {
          const isExtremity = p.isDepot || p.isArrival || p.client === "Départ" || p.client === "Retour";
          const markerLabel = isExtremity ? (p.client === "Départ" ? "D" : "R") : String(index);
          const markerColor = isExtremity ? "#10b981" : "#3b82f6";

          const marker = new window.google.maps.Marker({
            position: { lat: p.lat, lng: p.lon },
            map: map,
            title: p.client || p.address,
            label: { text: markerLabel, color: "white", fontWeight: "bold", fontSize: "12px" },
            icon: {
              path: window.google.maps.SymbolPath.CIRCLE,
              fillColor: markerColor, fillOpacity: 1,
              strokeColor: "white", strokeWeight: 2, scale: 12
            }
          });

          const infoWindow = new window.google.maps.InfoWindow({
            content: `<div style="font-family: sans-serif; padding: 5px;"><strong>${p.client || (isExtremity ? p.client : "Client")}</strong><br/>${p.address}</div>`
          });

          marker.addListener("click", () => infoWindow.open({ anchor: marker, map, shouldFocus: false }));
          markersRef.current.push(marker);
          bounds.extend({ lat: p.lat, lng: p.lon });
        });

        // Tracé (vérification stricte du format pour éviter l'écran blanc)
        if (routeGeometry && Array.isArray(routeGeometry) && routeGeometry.length > 0 && routeGeometry[0].lat !== undefined) {
          polylineRef.current = new window.google.maps.Polyline({
            path: routeGeometry, geodesic: true,
            strokeColor: "#2563eb", strokeOpacity: 0.8, strokeWeight: 5,
            map: map
          });
          routeGeometry.forEach(coord => bounds.extend(coord));
        }

        if (!bounds.isEmpty()) {
          map.fitBounds(bounds);
          if (activePoints.length === 1 && (!routeGeometry || routeGeometry.length === 0)) {
            setTimeout(() => map.setZoom(13), 100);
          }
        }
      }, [points, routeGeometry]);

      return <div ref={mapDivRef} id="map-container" className="no-print">Chargement de la carte...</div>;
    }

    function App() {
      // CHANGEMENT DU NOM DE LA SAUVEGARDE POUR ÉVITER LE CONFLIT (v2)
      const savedState = JSON.parse(localStorage.getItem('rueDuStore_autosave_v2') || 'null');

      const [depot, setDepot] = useState(savedState?.depot || { address: "Orléans", lat: 47.902964, lon: 1.909251 });
      const [arrival, setArrival] = useState(savedState?.arrival || { address: "", lat: null, lon: null });
      const [sameAsStart, setSameAsStart] = useState(savedState?.sameAsStart ?? true);
      const [tourDate, setTourDate] = useState(savedState?.tourDate || new Date().toISOString().split('T')[0]);
      const [startTime, setStartTime] = useState(savedState?.startTime || "08:00");
      const [transportMode, setTransportMode] = useState(savedState?.transportMode || "DRIVING"); 
      const [jobs, setJobs] = useState(savedState?.jobs || [{ id: Date.now(), client: "", email: "", address: "", duration: 60, notes: "", lat: null, lon: null }]);
      const [result, setResult] = useState(savedState?.result || null);
      const [routeGeo, setRouteGeo] = useState(savedState?.routeGeo || []);
      
      const [loading, setLoading] = useState(false);
      const [calModalOpen, setCalModalOpen] = useState(false);
      const [calModalText, setCalModalText] = useState("");
      const [calModalJob, setCalModalJob] = useState(null);
      const [expandedRows, setExpandedRows] = useState({});

      useEffect(() => {
        const stateToSave = { depot, arrival, sameAsStart, tourDate, startTime, transportMode, jobs, result, routeGeo };
        localStorage.setItem('rueDuStore_autosave_v2', JSON.stringify(stateToSave));
      }, [depot, arrival, sameAsStart, tourDate, startTime, transportMode, jobs, result, routeGeo]);

      const exportJSON = () => {
        const data = { depot, arrival, sameAsStart, tourDate, startTime, transportMode, jobs, result, routeGeo };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; 
        a.download = `Tournee_RueDuStore_${tourDate}.json`;
        a.click(); 
        URL.revokeObjectURL(url);
      };

      const importJSON = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            setDepot(data.depot); setArrival(data.arrival); setSameAsStart(data.sameAsStart);
            setTourDate(data.tourDate); setStartTime(data.startTime); setTransportMode(data.transportMode);
            setJobs(data.jobs); setResult(data.result); setRouteGeo(data.routeGeo);
            setExpandedRows({});
          } catch(err) { 
            alert("Erreur: Ce fichier n'est pas une sauvegarde valide."); 
          }
        };
        reader.readAsText(file);
        e.target.value = null; 
      };

      const geocodeIfNeeded = async (addr, existingLat) => {
        if (existingLat || !addr) return null;
        const geocoder = new window.google.maps.Geocoder();
        return new Promise((resolve, reject) => {
          geocoder.geocode({ address: addr }, (results, status) => {
            if (status === 'OK') resolve({ lat: results[0].geometry.location.lat(), lon: results[0].geometry.location.lng() });
            else reject(new Error(`Adresse introuvable : ${addr}`));
          });
        });
      };

      const getTransitEmoji = (type) => {
        const t = (type || "").toUpperCase();
        if(t.includes("SUBWAY")) return "🚇";
        if(t.includes("BUS")) return "🚌";
        if(t.includes("TRAM")) return "🚋";
        if(t.includes("TRAIN") || t.includes("RAIL")) return "🚆";
        return "🚍";
      };

      const toggleRow = (idx) => {
        setExpandedRows(prev => ({ ...prev, [idx]: !prev[idx] }));
      };

      const updateTimesAndRoute = async (currentOrder) => {
        setLoading(true);
        try {
          const directionsService = new window.google.maps.DirectionsService();
          const returnPoint = sameAsStart ? depot : arrival;
          
          const sequence = [
            {...depot, isDepot:true, client:"Départ"}, 
            ...currentOrder, 
            {...returnPoint, isDepot:true, isArrival:true, client:"Retour", duration: 0}
          ];

          let newPlan = [];
          let fullRouteGeo = [];
          let currentTime = timeToMinutes(startTime);
          let lastPhysicalPoint = sequence[0];

          for (let i = 1; i < sequence.length; i++) {
            const currentItem = sequence[i];

            if (currentItem.isLunch) {
              const buffer = currentItem.eatOnSite ? 0 : 15;
              const arriveLunch = currentTime + buffer;
              const dur = currentItem.duration || 60;
              newPlan.push({ ...currentItem, arrive: minutesToTime(arriveLunch), depart: minutesToTime(arriveLunch + dur) });
              currentTime = arriveLunch + dur + buffer;
            } else {
              const request = {
                origin: new window.google.maps.LatLng(lastPhysicalPoint.lat, lastPhysicalPoint.lon),
                destination: new window.google.maps.LatLng(currentItem.lat, currentItem.lon),
                travelMode: transportMode
              };

              const routeResult = await new Promise((resolve, reject) => {
                directionsService.route(request, (res, status) => {
                  if (status === 'OK') resolve(res);
                  else reject(new Error(`Calcul impossible entre ${lastPhysicalPoint.client||lastPhysicalPoint.address} et ${currentItem.client||currentItem.address}`));
                });
              });

              let transitStepsInfo = [];
              let detailedSteps = [];
              
              if (transportMode === 'TRANSIT') {
                routeResult.routes[0].legs[0].steps.forEach(step => {
                  if (step.travel_mode === 'TRANSIT' && step.transit) {
                    const t = step.transit;
                    const emoji = getTransitEmoji(t.line?.vehicle?.type);
                    transitStepsInfo.push(`${emoji} ${t.line.short_name || t.line.name} (${t.departure_stop.name} ➔ ${t.arrival_stop.name})`);
                  } else if (step.travel_mode === 'WALKING' && step.distance.value > 300) {
                    transitStepsInfo.push(`🚶 Marche (${step.distance.text})`);
                  }
                  
                  let instructionHTML = step.instructions || "";
                  detailedSteps.push({
                    mode: step.travel_mode,
                    instruction: instructionHTML,
                    distance: step.distance?.text || "",
                    duration: step.duration?.text || "",
                    transitDetails: step.transit || null
                  });
                });
              }

              const travelDuration = Math.ceil(routeResult.routes[0].legs[0].duration.value / 60);
              currentTime += travelDuration;

              const dur = currentItem.duration || 0;
              newPlan.push({
                ...currentItem,
                arrive: minutesToTime(currentTime),
                depart: currentItem.isArrival ? "-" : minutesToTime(currentTime + dur),
                transitSteps: transitStepsInfo,
                detailedSteps: detailedSteps
              });
              
              currentTime += dur;
              lastPhysicalPoint = currentItem;

              const path = routeResult.routes[0].overview_path.map(p => ({ lat: p.lat(), lng: p.lng() }));
              fullRouteGeo = fullRouteGeo.concat(path);
            }
          }

          setResult({ plan: newPlan });
          setRouteGeo(fullRouteGeo);

        } catch (e) { alert(e.message); }
        setLoading(false);
      };

      const computePlan = async () => {
        setLoading(true);
        try {
          let currentDepot = { ...depot };
          const depGeo = await geocodeIfNeeded(currentDepot.address, currentDepot.lat);
          if (depGeo) Object.assign(currentDepot, depGeo);
          
          let currentArrival = sameAsStart ? { ...currentDepot } : { ...arrival };
          const arrGeo = await geocodeIfNeeded(currentArrival.address, currentArrival.lat);
          if (!sameAsStart && arrGeo) Object.assign(currentArrival, arrGeo);

          const allJobs = [...jobs];
          for (let job of allJobs) {
            const jobGeo = await geocodeIfNeeded(job.address, job.lat);
            if (jobGeo) Object.assign(job, jobGeo);
          }

          let currentPoint = currentDepot;
          let unvisited = allJobs.filter(j => j.lat);
          let orderedJobs = [];
          
          while(unvisited.length) {
            unvisited.sort((a,b) => (Math.pow(a.lat - currentPoint.lat, 2) + Math.pow(a.lon - currentPoint.lon, 2)) - (Math.pow(b.lat - currentPoint.lat, 2) + Math.pow(b.lon - currentPoint.lon, 2)));
            currentPoint = unvisited.shift();
            orderedJobs.push(currentPoint);
          }

          await updateTimesAndRoute(orderedJobs);
          setExpandedRows({}); 

        } catch (e) { alert(e.message); setLoading(false); }
      };

      const addLunch = () => {
        const lunch = { id: 'lunch-' + Date.now(), client: "PAUSE DÉJEUNER", isLunch: true, eatOnSite: false, duration: 60, address: "Sur place", lat: null, lon: null };
        if (result && result.plan) {
            const newPlan = [...result.plan.filter(p => !p.isArrival)];
            newPlan.push(lunch);
            updateTimesAndRoute(newPlan);
        } else {
            alert("Veuillez d'abord calculer la tournée avant d'ajouter une pause.");
        }
      };

      const updateJob = (id, field, value) => { setJobs(prev => prev.map(j => j.id === id ? { ...j, [field]: value } : j)); };
      const updateJobData = (id, updates) => { setJobs(prev => prev.map(j => j.id === id ? { ...j, ...updates } : j)); };
      const removeJob = (id) => setJobs(prev => prev.filter(j => j.id !== id));
      const addJob = () => setJobs(prev => [...prev, { id: Date.now(), client: "", email: "", address: "", duration: 60, notes: "", lat: null, lon: null }]);

      const [draggedIdx, setDraggedIdx] = useState(null);
      const [dragOverIdx, setDragOverIdx] = useState(null);
      
      const onDrop = (idx) => {
        setDragOverIdx(null);
        if (draggedIdx === null || draggedIdx === idx) return;
        const currentPlan = [...result.plan.filter(p => !p.isArrival)];
        const item = currentPlan.splice(draggedIdx, 1)[0];
        currentPlan.splice(idx, 0, item);
        updateTimesAndRoute(currentPlan);
        setDraggedIdx(null);
      };

      const sendEmail = (p) => {
        const d = new Date(tourDate).toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        const poseObj = p.notes ? p.notes : "votre installation";
        const timeLabel = getVagueTimeLabel(p.arrive); 
        
        const subject = encodeURIComponent(`Confirmation d'intervention Rue du Store - ${d}`);
        const body = encodeURIComponent(
          `Bonjour,\n\n` +
          `Nous vous confirmons par la présente le passage de nos techniciens pour l'intervention suivante :\n\n` +
          `• Objet : ${poseObj}\n` +
          `• Date : ${d}\n` +
          `• Créneau d'arrivée indicatif : ${timeLabel}\n\n` +
          `Nos équipes font le maximum pour respecter nos horaires, toutefois ceux-ci restent dépendants des aléas de circulation ou de chantiers précédents. En cas de retard important, nous ne manquerons pas de vous prévenir.\n\n` +
          `Cordialement,\n\nL'équipe Rue du Store\nwww.ruedustore.fr`
        );
        window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${p.email}&su=${subject}&body=${body}`, '_blank');
      };

      const openCalendarModal = (p) => {
        setCalModalText(`Notes : ${p.notes || 'Aucune'}\nClient : ${p.client}\nEmail : ${p.email || 'Non renseigné'}`);
        setCalModalJob(p);
        setCalModalOpen(true);
      };

      const confirmAddToCalendar = () => {
        if (!calModalJob) return;
        const p = calModalJob;
        const [y, m, d] = tourDate.split('-');
        const arriveTime = p.arrive.replace('h', '') + '00';
        const departTime = p.depart.replace('h', '') + '00';
        
        const dates = `${y}${m}${d}T${arriveTime}/${y}${m}${d}T${departTime}`;
        const title = encodeURIComponent(`Intervention - ${p.client}`);
        const details = encodeURIComponent(calModalText);
        const location = encodeURIComponent(p.address || '');

        const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&details=${details}&location=${location}`;
        window.open(url, '_blank');
        setCalModalOpen(false);
      };

      return (
        <div className="container">
          
          <div className="no-print" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
            <h1 style={{ fontSize: '24px', color: '#111827', margin: 0 }}>📍 Planificateur de Tournées</h1>
            <div style={{ display: 'flex', gap: '10px' }}>
              <input type="file" id="json-upload" style={{ display: 'none' }} accept=".json" onChange={importJSON} />
              <button className="btn btn-secondary" onClick={() => document.getElementById('json-upload').click()}>📂 Importer</button>
              <button className="btn btn-secondary" onClick={exportJSON}>💾 Exporter JSON</button>
            </div>
          </div>

          <div className="no-print card">
            <div className="card-title">Configuration de la journée</div>
            <div className="grid-3" style={{ marginBottom: '15px' }}>
              <div><label>Date</label><input type="date" value={tourDate} onChange={e => setTourDate(e.target.value)} /></div>
              <div><label>Heure de départ</label><input type="time" value={startTime} onChange={e => setStartTime(e.target.value)} /></div>
              <div>
                <label>Mode de transport</label>
                <select value={transportMode} onChange={e => { setTransportMode(e.target.value); setResult(null); }}>
                  <option value="DRIVING">🚗 Voiture</option>
                  <option value="BICYCLING">🚲 Vélo</option>
                  <option value="WALKING">🚶 Marche</option>
                  <option value="TRANSIT">🚇 Transports en commun</option>
                </select>
              </div>
            </div>

            <div className="grid-2">
              <div>
                <label>Départ</label>
                <GoogleAddressInput placeholder="Adresse de départ" value={depot.address} onChange={v => setDepot(prev => ({...prev, address: v, lat: null}))} onPick={s => setDepot(prev => ({...prev, address: s.label, lat: s.lat, lon: s.lon}))} />
              </div>
              <div>
                <label style={{ display: 'flex', justifyContent: 'space-between' }}>
                  Retour <span style={{ fontWeight: 'normal', fontSize: '12px' }}><input type="checkbox" checked={sameAsStart} onChange={e => setSameAsStart(e.target.checked)} /> Identique</span>
                </label>
                {!sameAsStart && <GoogleAddressInput placeholder="Adresse de fin" value={arrival.address} onChange={v => setArrival(prev => ({...prev, address: v, lat: null}))} onPick={s => setArrival(prev => ({...prev, address: s.label, lat: s.lat, lon: s.lon}))} />}
              </div>
            </div>
          </div>

          <div className="no-print card">
            <div className="card-title">Liste des chantiers</div>
            {jobs.map((j, index) => (
              <div key={j.id} className="job-block">
                <button className="btn btn-danger remove-job" onClick={() => removeJob(j.id)}>✖</button>
                <h4 style={{ marginBottom: '10px', color: '#3b82f6' }}>Chantier {index + 1}</h4>
                <div className="grid-2" style={{ marginBottom: '10px' }}>
                  <div><label>Client</label><input type="text" value={j.client} onChange={e => updateJob(j.id, 'client', e.target.value)} /></div>
                  <div><label>Adresse</label><GoogleAddressInput value={j.address} onChange={v => updateJob(j.id, 'address', v)} onPick={s => updateJobData(j.id, { address: s.label, lat: s.lat, lon: s.lon })} /></div>
                </div>
                <div className="grid-3">
                  <div><label>Durée (min)</label><input type="number" step="15" min="15" value={j.duration} onChange={e => updateJob(j.id, 'duration', parseInt(e.target.value) || 0)} /></div>
                  <div><label>Email</label><input type="text" value={j.email} onChange={e => updateJob(j.id, 'email', e.target.value)} /></div>
                  <div><label>Notes</label><input type="text" value={j.notes} onChange={e => updateJob(j.id, 'notes', e.target.value)} /></div>
                </div>
              </div>
            ))}
            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '20px' }}>
              <button className="btn btn-secondary" onClick={addJob}>+ Ajouter un chantier</button>
              <button className="btn btn-primary" onClick={computePlan} disabled={loading || jobs.length === 0}>{loading ? "Calcul en cours..." : "🚀 Calculer l'itinéraire"}</button>
            </div>
          </div>

          <GoogleMapComponent points={result ? [{...depot, isDepot:true, client:"Départ"}, ...result.plan] : [{...depot, isDepot:true, client:"Départ"}, ...jobs]} routeGeometry={routeGeo} />

          {result && (
            <div className="card">
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                <h2 style={{ margin: 0 }}>Feuille de route</h2>
                <div className="no-print" style={{ display: 'flex', gap: '10px' }}>
                    <button className="btn" style={{ background: '#fef3c7', color: '#92400e', border: '1px solid #fde68a' }} onClick={addLunch}>🍴 Ajouter pause déj.</button>
                    <button className="btn btn-secondary" onClick={() => window.print()}>🖨️ Imprimer</button>
                </div>
              </div>
              
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Client / Lieu</th>
                    <th>Arrivée</th>
                    <th>Durée</th>
                    <th>Départ</th>
                    <th className="no-print">Action</th>
                  </tr>
                </thead>
                <tbody>
                  {result.plan.map((p, i) => (
                    <React.Fragment key={p.id || i}>
                      <tr className={`${p.isLunch ? "lunch-row" : ""} ${!p.isArrival ? "draggable-row" : ""} ${dragOverIdx === i ? "drag-over" : ""}`}
                          draggable={!p.isArrival} 
                          onDragStart={() => setDraggedIdx(i)} 
                          onDragOver={(e) => { e.preventDefault(); setDragOverIdx(i); }} 
                          onDragLeave={() => setDragOverIdx(null)}
                          onDrop={() => onDrop(i)}>
                        <td>
                          {!p.isArrival && <span className="drag-handle no-print" title="Glisser pour déplacer">☰</span>}
                          {p.isLunch ? "🍴" : (p.isArrival ? "🏁" : i + 1)}
                        </td>
                        <td>
                          <strong>{p.client}</strong>
                          {p.isLunch ? (
                            <div className="no-print" style={{ marginTop: '5px', display: 'flex', alignItems: 'center', gap: '5px', fontSize: '12px' }}>
                              <input type="checkbox" checked={p.eatOnSite} onChange={(e) => {
                                const newPlan = [...result.plan.filter(x => !x.isArrival)];
                                newPlan[i].eatOnSite = e.target.checked;
                                updateTimesAndRoute(newPlan); 
                              }} style={{ width: 'auto', margin: 0 }} />
                              <span>Mange sur place (supprime le trajet)</span>
                            </div>
                          ) : (
                            <div style={{ fontSize: '12px', color: '#6b7280', marginTop: '4px' }}>{p.address}</div>
                          )}
                          
                          {p.transitSteps && p.transitSteps.length > 0 && (
                             <div style={{ marginTop: '6px' }}>
                                {p.transitSteps.map((step, idx) => (
                                   <span key={idx} className="transit-step">{step}</span>
                                ))}
                             </div>
                          )}

                          {p.detailedSteps && p.detailedSteps.length > 0 && (
                            <div className="no-print" style={{ marginTop: '10px' }}>
                              <button onClick={() => toggleRow(i)} className="btn-secondary" style={{ fontSize: '11px', padding: '4px 8px', borderRadius: '4px' }}>
                                {expandedRows[i] ? "Masquer le détail ▲" : "Détail de l'itinéraire ▼"}
                              </button>
                            </div>
                          )}

                        </td>
                        <td style={{ fontWeight: 'bold', color: '#16a34a' }}>{p.arrive}</td>
                        <td>
                           {p.isArrival ? "-" : (
                            <select className="no-print" style={{ width: 80, padding: 2, margin: 0 }} value={p.duration} onChange={(e) => {
                              const newPlan = [...result.plan.filter(x => !x.isArrival)];
                              newPlan[i].duration = parseInt(e.target.value);
                              updateTimesAndRoute(newPlan); 
                            }}>
                              {[15, 30, 45, 60, 75, 90, 105, 120, 150, 180, 210, 240].map(m => <option key={m} value={m}>{Math.floor(m/60)}h{String(m%60).padStart(2,'0')}</option>)}
                            </select>
                          )}
                          <span className="print-only">{p.isArrival ? "-" : `${Math.floor(p.duration/60)}h${String(p.duration%60).padStart(2,'0')}`}</span>
                        </td>
                        <td style={{ fontWeight: 'bold', color: '#dc2626' }}>{p.depart}</td>
                        <td className="no-print">
                          {!p.isArrival && !p.isLunch && (
                            <div style={{ display: 'flex', gap: '5px' }}>
                              {p.email && <button onClick={() => sendEmail(p)} className="btn-mail">📧 Mail</button>}
                              <button onClick={() => openCalendarModal(p)} className="btn-cal">📅 Agenda</button>
                            </div>
                          )}
                          {p.isLunch && <button onClick={() => updateTimesAndRoute(result.plan.filter((_,idx) => idx !== i && !_.isArrival))} className="btn-del-lunch">Supprimer</button>}
                        </td>
                      </tr>

                      {expandedRows[i] && p.detailedSteps && (
                        <tr className="transit-detail-row no-print">
                          <td></td>
                          <td colSpan="5" style={{ padding: '15px', color: '#4b5563', fontSize: '13px' }}>
                            <h4 style={{ margin: '0 0 10px 0', fontSize: '14px', color: '#1f2937' }}>Itinéraire détaillé :</h4>
                            <ul style={{ listStyleType: 'none', padding: 0, margin: 0 }}>
                              {p.detailedSteps.map((ds, idx) => (
                                <li key={idx} style={{ display: 'flex', gap: '10px', marginBottom: '8px', alignItems: 'center' }}>
                                  <span style={{ fontSize: '16px', minWidth: '20px', textAlign: 'center' }}>
                                    {ds.mode === 'WALKING' ? '🚶' : getTransitEmoji(ds.transitDetails?.line?.vehicle?.type)}
                                  </span>
                                  <div>
                                    <span dangerouslySetInnerHTML={{ __html: ds.instruction }} />
                                    <span style={{ color: '#9ca3af', marginLeft: '8px' }}>({ds.distance} - {ds.duration})</span>
                                  </div>
                                </li>
                              ))}
                            </ul>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
              {loading && <div style={{ textAlign: 'center', padding: '10px', color: '#3b82f6', fontWeight: 'bold' }}>Recalcul de l'itinéraire en cours...</div>}
            </div>
          )}

          {calModalOpen && (
            <div className="no-print modal-overlay">
              <div className="modal-content">
                <h3 style={{ marginTop: 0, marginBottom: 15 }}>Détails pour l'Agenda</h3>
                <p style={{ fontSize: 13, color: '#4b5563', marginBottom: 10 }}>Modifiez la description du rendez-vous :</p>
                <textarea 
                  value={calModalText} 
                  onChange={(e) => setCalModalText(e.target.value)}
                  style={{ height: '120px', resize: 'vertical', marginBottom: 15 }}
                />
                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10 }}>
                  <button className="btn btn-secondary" onClick={() => setCalModalOpen(false)}>Annuler</button>
                  <button className="btn btn-primary" onClick={confirmAddToCalendar}>Ouvrir l'Agenda</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
