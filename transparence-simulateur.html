<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        .transparency-tool {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .view-container {
            position: relative;
            width: 100%;
            height: 350px;
            border-radius: 8px;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?auto=format&fit=crop&w=800&q=80') center/cover;
            margin-bottom: 20px;
            border: 4px solid #2c3e50;
        }

        /* Le calque qui simule le store */
        .fabric-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f0f0f0; /* Couleur du store (gris clair/blanc) */
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* Effet de trame (texture micro-perforée) */
        .fabric-layer::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#ccc 1px, transparent 1px);
            background-size: 4px 4px; /* Simule les trous */
            opacity: 0.3;
        }

        .controls {
            padding: 10px;
        }

        .slider {
            width: 100%;
            margin: 20px 0;
            cursor: pointer;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #2c3e50;
        }

        .info-box {
            margin-top: 15px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 6px;
            font-size: 0.9em;
            min-height: 60px;
        }

        .highlight { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

<div class="transparency-tool">
    <h3>Simulateur d'ouverture du tissu</h3>
    
    <div class="view-container">
        <div id="fabric" class="fabric-layer" style="opacity: 0.96;"></div>
    </div>

    <div class="controls">
        <div class="labels">
            <span>1%</span>
            <span>3%</span>
            <span>5%</span>
            <span>10%</span>
        </div>
        <input type="range" min="1" max="4" step="1" value="1" class="slider" id="transparencyRange">
        
        <div class="info-box" id="infoText">
            <strong>Coefficient d'ouverture : <span class="highlight">1% (Occultant/Tamisant fort)</span></strong><br>
            Excellente intimité. On ne devine que des ombres de l'extérieur. Idéal pour les chambres ou vis-à-vis proches.
        </div>
    </div>
</div>

<script>
    const slider = document.getElementById('transparencyRange');
    const fabric = document.getElementById('fabric');
    const infoText = document.getElementById('infoText');

    const data = {
        1: { opacity: 0.96, label: "1% (Intimité Maximale)", desc: "Protection totale contre les regards. La vue extérieure est très floue. Idéal pour le rez-de-chaussée." },
        2: { opacity: 0.88, label: "3% (Le Standard)", desc: "Le bon compromis. On commence à deviner l'extérieur tout en restant bien protégé des regards indiscrets." },
        3: { opacity: 0.75, label: "5% (Confort Visuel)", desc: "Belle transparence vers l'extérieur. Attention : le soir, si vous êtes éclairé à l'intérieur, on devine vos silhouettes." },
        4: { opacity: 0.55, label: "10% (Vue Dégagée)", desc: "Priorité à la vue ! Très peu d'intimité le soir, mais une clarté exceptionnelle la journée." }
    };

    slider.oninput = function() {
        const val = this.value;
        fabric.style.opacity = data[val].opacity;
        infoText.innerHTML = `<strong>Coefficient d'ouverture : <span class="highlight">${data[val].label}</span></strong><br>${data[val].desc}`;
    };
</script>

</body>
</html>
