<script>
/**
 * Outil de Panachage SBV - Rue du Store
 * DA Premium RDS | Protection Intégrée
 */
(function() {
    // 1. PROTECTION SÉCURITÉ
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; };

    // 2. CONSTANTES & COULEURS
    const RDS_BLEU = "#25737d";
    const RDS_ORANGE = "#ff7200";
    const RDS_GRIS = "#e8e8e8";

    // 3. LOGIQUE MÉTIER SBV
    let allStores = [];
    let storeCounter = 0;
    const TABLE_SBV = { "8.9": { max: 600, lames: 78 }, "12.7": { max: 600, lames: 54 } };

    function init() {
        document.documentElement.style.overflow = 'auto'; // On laisse le scroll pour le panachage
        document.body.style.margin = '0';
        document.body.style.backgroundColor = RDS_GRIS;

        document.body.innerHTML = `
            <div id="rds-panachage">
                <header class="rds-header no-print">
                    <div class="header-left">
                        <h1>Expert Panachage SBV</h1>
                        <div class="rds-line"></div>
                        <div class="ref-box">
                            <label>CHANTIER :</label>
                            <input type="text" id="refGlobale" placeholder="Nom du client / Dossier..." oninput="saveState()">
                        </div>
                    </div>
                    <div class="header-right">
                        <button class="btn btn-secondary" onclick="resetAllData()">🗑️ Reset</button>
                        <button class="btn btn-primary" onclick="addNewStore()">➕ Ajouter un Store</button>
                    </div>
                </header>

                <div id="all-stores-container"></div>

                <footer class="rds-footer no-print">
                    <button class="btn btn-print-large" onclick="window.print()">🖨️ IMPRIMER LE BON DE FABRICATION</button>
                    <p>RUE DU STORE © 2026 - Outil de configuration assistée</p>
                </footer>
            </div>
        `;

        const style = document.createElement('style');
        style.innerHTML = `
            #rds-panachage { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
            .rds-header { background: white; padding: 30px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(37, 115, 125, 0.05); }
            .rds-header h1 { color: ${RDS_BLEU}; margin: 0; font-weight: 900; text-transform: uppercase; font-size: 1.5rem; }
            .rds-line { width: 50px; height: 5px; background: ${RDS_ORANGE}; margin: 10px 0 20px; border-radius: 10px; }
            
            .ref-box { display: flex; align-items: center; gap: 10px; }
            .ref-box label { font-size: 0.75rem; font-weight: 800; color: ${RDS_BLEU}; opacity: 0.7; }
            .ref-box input { border: 1px solid #ddd; padding: 10px; border-radius: 8px; width: 250px; font-weight: bold; }

            /* BOUTONS */
            .btn { cursor: pointer; padding: 12px 24px; border-radius: 12px; border: none; font-weight: 800; font-size: 0.85rem; transition: 0.3s; text-transform: uppercase; }
            .btn-primary { background: ${RDS_BLEU}; color: white; }
            .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 115, 125, 0.2); }
            .btn-secondary { background: #f3f4f6; color: #666; }
            .btn-print-large { background: ${RDS_ORANGE}; color: white; font-size: 1.1rem; padding: 20px 50px; box-shadow: 0 10px 20px rgba(255, 114, 0, 0.2); }

            /* CARTE STORE */
            .store-container { background: white; border-radius: 24px; padding: 35px; margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 15px 35px rgba(0,0,0,0.03); }
            .store-title-input { font-size: 1.3rem; font-weight: 900; color: ${RDS_BLEU}; border: none; background: transparent; padding: 5px; width: 70%; border-bottom: 2px solid transparent; transition: 0.3s; }
            .store-title-input:focus { border-bottom-color: ${RDS_ORANGE}; outline: none; }

            .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 25px 0; }
            .input-group label { display: block; font-size: 11px; font-weight: 800; color: ${RDS_BLEU}; text-transform: uppercase; margin-bottom: 8px; opacity: 0.8; }
            input[type="number"], input[type="text"] { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; background: #fafafa; font-weight: 600; }

            .radio-group { display: flex; gap: 10px; }
            .radio-opt { flex: 1; padding: 10px; border: 1px solid #eee; text-align: center; border-radius: 10px; cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: 0.3s; }
            .radio-opt.active { background: ${RDS_BLEU}; color: white; border-color: ${RDS_BLEU}; }

            /* SEGMENTS COULEURS */
            .segment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; background: #f9fafb; padding: 20px; border-radius: 15px; margin: 15px 0; border: 1px dashed #ddd; }
            .segment-block { background: white; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
            .color-preview { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.1); margin-bottom: 10px; cursor: pointer; }

            /* APERÇU LAMES */
            .store-preview { display: flex; flex-wrap: nowrap; overflow-x: auto; background: #2c3e50; padding: 45px 30px 30px 30px; border-radius: 18px; margin-top: 20px; scrollbar-width: thin; scrollbar-color: ${RDS_ORANGE} #2c3e50; min-height: 200px; position: relative; }
            .slat { flex-shrink: 0; width: 35px; height: 140px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); margin-left: -15px; box-shadow: 3px 0 10px rgba(0,0,0,0.3); transition: 0.2s; position: relative; cursor: grab; }
            .slat:first-child { margin-left: 0; }
            .slat:hover { transform: translateY(-10px); z-index: 100 !important; border-color: white; }
            .slat::after { content: attr(data-num); position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: ${RDS_ORANGE}; color: white; font-size: 10px; font-weight: 900; padding: 3px 6px; border-radius: 4px; opacity: 0; transition: 0.3s; }
            .slat:hover::after { opacity: 1; }

            .recap-box { background: ${RDS_BLEU}; color: white; padding: 20px; border-radius: 15px; margin-top: 20px; font-size: 0.9rem; }
            .recap-box b { color: ${RDS_ORANGE}; }

            .rds-footer { text-align: center; margin-top: 50px; border-top: 2px solid #ddd; padding-top: 40px; color: #999; font-size: 0.8rem; }

            @media print {
                .no-print { display: none !important; }
                body { background: white; padding: 0; }
                .store-container { border: 2px solid #eee; border-radius: 0; box-shadow: none; page-break-inside: avoid; }
                .store-preview { background: transparent !important; padding: 10px !important; overflow: visible !important; flex-wrap: wrap !important; }
                .slat { width: 15px !important; height: 50px !important; margin: 2px !important; border: 1px solid #000 !important; -webkit-print-color-adjust: exact; }
                .recap-box { background: transparent !important; color: black !important; border: 1px solid #ddd; }
                .recap-box b { color: black !important; }
            }
        `;
        document.head.appendChild(style);
        loadState();
    }

    // --- LOGIQUE CORE ---

    window.addNewStore = function() {
        storeCounter++;
        const storeObj = {
            id: storeCounter,
            title: `Store ${storeCounter} - Repère`,
            railWidth: 100,
            lameType: "8.9",
            nbLames: 13,
            segments: [{ couleur: '#25737d', refTissu: 'TISSU-RDS-BLEU', count: 1 }, { couleur: '#ff7200', refTissu: 'TISSU-RDS-ORANGE', count: 1 }],
            plan: [],
            planHistory: []
        };
        allStores.push(storeObj);
        renderStoreUI(storeObj);
        saveState();
    };

    function renderStoreUI(s) {
        const container = document.getElementById('all-stores-container');
        const div = document.createElement('div');
        div.className = 'store-container';
        div.id = `store-card-${s.id}`;
        div.innerHTML = `
            <div class="store-header">
                <input type="text" class="store-title-input" value="${s.title}" oninput="updateData(${s.id},'title',this.value)">
                <button class="btn btn-secondary no-print" onclick="deleteStore(${s.id})">🗑️ Supprimer</button>
            </div>
            
            <div class="grid-inputs no-print">
                <div class="input-group">
                    <label>Largeur Rail (cm)</label>
                    <input type="number" id="railWidth-${s.id}" value="${s.railWidth}" oninput="updateData(${s.id},'railWidth',parseFloat(this.value)); calculateLames(${s.id})">
                </div>
                <div class="input-group">
                    <label>Modèle de lame</label>
                    <div class="radio-group">
                        <div class="radio-opt ${s.lameType=='8.9'?'active':''}" onclick="updateLameType(${s.id},'8.9')">8.9 cm</div>
                        <div class="radio-opt ${s.lameType=='12.7'?'active':''}" onclick="updateLameType(${s.id},'12.7')">12.7 cm</div>
                    </div>
                </div>
                <div class="input-group">
                    <label>Nombre de lames</label>
                    <input type="number" id="nbLames-${s.id}" value="${s.nbLames}" onchange="updateData(${s.id},'nbLames',parseInt(this.value))">
                </div>
            </div>

            <div class="no-print" style="margin-bottom:20px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label style="font-weight:900; font-size:0.75rem; color:${RDS_BLEU};">SÉLECTION DES COLORIS</label>
                    <div style="display:flex; gap:10px;">
                        <button class="btn btn-secondary" style="padding:5px 10px;" onclick="suggestPattern(${s.id})">✨ Aléatoire</button>
                        <button class="btn btn-secondary" style="padding:5px 10px;" onclick="symmetryPattern(${s.id})">🪞 Miroir</button>
                    </div>
                </div>
                <div class="segment-grid" id="segments-${s.id}"></div>
                <button class="btn btn-secondary" onclick="addSegment(${s.id})">➕ Ajouter une couleur</button>
            </div>

            <button class="btn btn-primary no-print" onclick="generatePlan(${s.id})" style="width:100%; margin-bottom:20px;">🔄 Générer l'aperçu du store</button>

            <div class="store-preview" id="preview-${s.id}"></div>
            <div id="recap-${s.id}"></div>
        `;
        container.appendChild(div);
        renderSegments(s.id);
        if(s.plan && s.plan.length > 0) refreshPreview(s.id);
    }

    window.calculateLames = function(id) {
        const s = allStores.find(x => x.id === id);
        const data = TABLE_SBV[s.lameType];
        s.nbLames = Math.ceil(s.railWidth * (data.lames / data.max));
        document.getElementById(`nbLames-${id}`).value = s.nbLames;
        saveState();
    };

    window.renderSegments = function(id) {
        const s = allStores.find(x=>x.id==id);
        const container = document.getElementById(`segments-${id}`);
        container.innerHTML = '';
        s.segments.forEach((seg, idx) => {
            const b = document.createElement('div'); b.className='segment-block';
            b.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                    <div class="color-preview" style="background:${seg.couleur}"></div>
                    <input type="color" value="${seg.couleur}" style="width:25px;height:25px;border:none;padding:0;background:none;" onchange="updateSeg(${id},${idx},'couleur',this.value); renderSegments(${id})">
                    <button style="margin-left:auto; border:none; background:none; cursor:pointer;" onclick="removeSegment(${id},${idx})">❌</button>
                </div>
                <label>Référence</label>
                <input type="text" value="${seg.refTissu}" onchange="updateSeg(${id},${idx},'refTissu',this.value)">
                <label>Quantité</label>
                <input type="number" value="${seg.count}" onchange="updateSeg(${id},${idx},'count',parseInt(this.value))">
            `;
            container.appendChild(b);
        });
    };

    window.generatePlan = function(id) {
        const s = allStores.find(x=>x.id==id);
        s.plan = []; const sum = s.segments.reduce((a,b)=>a+b.count,0);
        for(let i=0; i<s.nbLames; i++){
            let pos=i%sum, c=0, f=s.segments[0];
            for(const seg of s.segments){ if(pos>=c && pos<c+seg.count){f=seg; break;} c+=seg.count; }
            s.plan.push({...f});
        }
        refreshPreview(id);
        saveState();
    };

    window.refreshPreview = function(id) {
        const s = allStores.find(x=>x.id==id);
        const p = document.getElementById(`preview-${id}`);
        p.innerHTML = '';
        s.plan.forEach((lame, idx) => {
            const slat = document.createElement('div');
            slat.className = 'slat';
            slat.style.backgroundColor = lame.couleur;
            slat.setAttribute('data-num', idx + 1);
            
            // Drag and Drop
            slat.draggable = true;
            slat.ondragstart = (e) => { e.dataTransfer.setData('idx', idx); slat.style.opacity = '0.5'; };
            slat.ondragend = () => slat.style.opacity = '1';
            slat.ondragover = (e) => e.preventDefault();
            slat.ondrop = (e) => {
                const fromIdx = e.dataTransfer.getData('idx');
                const movedItem = s.plan.splice(fromIdx, 1)[0];
                s.plan.splice(idx, 0, movedItem);
                refreshPreview(id);
                saveState();
            };
            p.appendChild(slat);
        });
        updateRecap(s);
    };

    function updateRecap(s) {
        const counts = {}; s.plan.forEach(l => { const key = l.refTissu || 'Inconnu'; counts[key] = (counts[key] || 0) + 1; });
        const refChantier = document.getElementById('refGlobale').value || "---";
        document.getElementById(`recap-${s.id}`).innerHTML = `
            <div class="recap-box">
                <p><b>PROJET :</b> ${refChantier} | <b>LAMES :</b> ${s.nbLames} x ${s.lameType}cm</p>
                <div style="margin-top:10px;">
                    ${Object.entries(counts).map(([k,v])=>`• ${k} : <b>${v} lames</b>`).join(' &nbsp; ')}
                </div>
            </div>`;
    }

    // --- UTILS ---
    window.saveState = function() { 
        localStorage.setItem('sbv-stores', JSON.stringify(allStores));
        localStorage.setItem('sbv-ref', document.getElementById('refGlobale').value);
    };
    function loadState() {
        const saved = localStorage.getItem('sbv-stores');
        if(saved) {
            allStores = JSON.parse(saved);
            document.getElementById('refGlobale').value = localStorage.getItem('sbv-ref') || '';
            allStores.forEach(s => renderStoreUI(s));
        } else { addNewStore(); }
    }
    window.updateData = function(id,f,v) { const s=allStores.find(x=>x.id==id); if(s) s[f]=v; saveState(); };
    window.updateLameType = function(id,t) { const s=allStores.find(x=>x.id==id); s.lameType=t; document.getElementById(`store-card-${id}`).remove(); renderStoreUI(s); saveState(); };
    window.updateSeg = function(sId,idx,f,v) { allStores.find(x=>x.id==sId).segments[idx][f]=v; saveState(); };
    window.addSegment = function(id) { allStores.find(x=>x.id==id).segments.push({couleur:'#cccccc',refTissu:'',count:1}); renderSegments(id); saveState(); };
    window.removeSegment = function(id,idx) { const s=allStores.find(x=>x.id==id); if(s.segments.length>1){s.segments.splice(idx,1); renderSegments(id); saveState(); }};
    window.deleteStore = function(id) { if(confirm("Supprimer ce store ?")) { allStores=allStores.filter(x=>x.id!=id); document.getElementById(`store-card-${id}`).remove(); saveState(); } };
    window.resetAllData = function() { if(confirm("Tout effacer ?")) { localStorage.clear(); location.reload(); } };
    window.suggestPattern = function(id) { const s=allStores.find(x=>x.id==id); s.segments.forEach(seg=>seg.count=Math.floor(Math.random()*2)+1); renderSegments(id); generatePlan(id); };
    window.symmetryPattern = function(id) {
        const s = allStores.find(x => x.id == id);
        if (!s.plan || s.plan.length === 0) return;
        const mid = Math.floor(s.plan.length / 2);
        for(let i=0; i<mid; i++) s.plan[s.plan.length - 1 - i] = {...s.plan[i]};
        refreshPreview(id); saveState();
    };

    init();
})();
</script>
