<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificateur de Tournées - Rue du Store</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --rds-bleu: #25737d;
      --rds-orange: #ff7200;
      --rds-gris-bg: #e8e8e8;
      --rds-white: #ffffff;
      --rds-text: #1e293b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      background-color: var(--rds-gris-bg); 
      color: var(--rds-text); 
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Print Optimization */
    @media print { 
      .no-print { display: none !important; } 
      .card { box-shadow: none !important; border: 1px solid #ddd !important; border-radius: 0 !important; } 
      body { background: white; padding: 0; }
      #map-container { height: 300px !important; }
    }

    /* Layout & Cards */
    .card { 
      background: var(--rds-white); 
      padding: 30px; 
      border-radius: 20px; 
      box-shadow: 0 10px 25px rgba(37, 115, 125, 0.08); 
      margin-bottom: 25px; 
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
    }

    h2, h3 { color: var(--rds-bleu); text-transform: uppercase; font-weight: 900; letter-spacing: -0.5px; }
    .rds-divider { width: 40px; height: 4px; background: var(--rds-orange); margin: 10px 0 20px; border-radius: 10px; }

    /* Form Elements */
    label { display: block; font-size: 11px; font-weight: 800; margin-bottom: 6px; color: var(--rds-bleu); text-transform: uppercase; opacity: 0.8; }
    input, select, textarea { 
      width: 100%; padding: 12px; border: 1px solid rgba(37, 115, 125, 0.15); 
      border-radius: 10px; font-size: 14px; margin-bottom: 12px; transition: 0.3s;
      background: #fcfcfc;
    }
    input:focus, select:focus { outline: none; border-color: var(--rds-orange); box-shadow: 0 0 0 4px rgba(255, 114, 0, 0.1); }

    /* Buttons */
    .btn { cursor: pointer; padding: 12px 20px; border-radius: 10px; font-weight: 700; border: none; transition: all 0.2s; font-size: 13px; text-transform: uppercase; }
    .btn-primary { background: var(--rds-bleu); color: white; }
    .btn-primary:hover { background: #1d5c64; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(37, 115, 125, 0.2); }
    .btn-orange { background: var(--rds-orange); color: white; }
    .btn-orange:hover { background: #e66700; }
    .btn-secondary { background: #f3f4f6; color: var(--rds-bleu); border: 1px solid #d1d5db; }
    
    .btn-mail { background: #eff6ff; color: var(--rds-bleu); border: 1px solid #dbeafe; font-size: 10px; padding: 5px 10px; border-radius: 6px; }
    .btn-cal { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; font-size: 10px; padding: 5px 10px; border-radius: 6px; }

    /* Badges */
    .status-badge { font-size: 9px; padding: 2px 8px; border-radius: 50px; font-weight: 900; margin-left: 8px; text-transform: uppercase; }
    .status-ok { background: #dcfce7; color: #166534; }
    .status-pending { background: #fee2e2; color: #991b1b; }

    /* Map */
    #map-container { width: 100%; height: 450px; border-radius: 20px; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 25px; z-index: 1; }
    .map-number { border: 2px solid white; border-radius: 50%; color: white; font-weight: bold; text-align: center; line-height: 24px; font-size: 11px; width: 24px; height: 24px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .map-number.job { background: var(--rds-bleu); }
    .map-number.depot { background: var(--rds-orange); }

    /* Table & Drag */
    table { width: 100%; border-collapse: separate; border-spacing: 0 8px; font-size: 13px; }
    th { text-align: left; padding: 10px; color: var(--rds-bleu); font-size: 11px; text-transform: uppercase; }
    tr.draggable-row { background: #fff; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    tr.draggable-row td { padding: 15px 10px; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; }
    tr.draggable-row td:first-child { border-left: 1px solid #f0f0f0; border-radius: 12px 0 0 12px; }
    tr.draggable-row td:last-child { border-right: 1px solid #f0f0f0; border-radius: 0 12px 12px 0; }
    
    .drag-handle { cursor: grab; color: #cbd5e1; font-size: 18px; padding-right: 10px; }
    .lunch-row { background: #fffbeb !important; color: #92400e !important; }
    .drag-over { border-top: 2px solid var(--rds-orange) !important; }

    /* Modal Agenda */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(37, 115, 125, 0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .modal-content { background: white; padding: 35px; border-radius: 24px; width: 450px; max-width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    /* PROTECTION ANTI-CLIC DROIT & INSPECTER */
    document.addEventListener('contextmenu', e => e.preventDefault()); 
    document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; };

    const { useState, useEffect, useRef } = React;

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    async function geocode(address) {
      if (!address || address.length < 3) throw new Error("Adresse trop courte");
      const url = new URL("https://nominatim.openstreetmap.org/search");
      url.searchParams.set("q", address); url.searchParams.set("format", "jsonv2"); url.searchParams.set("limit", "1");
      const res = await fetch(url.toString(), { headers: { "User-Agent": "tour-planner-rue-du-store" } });
      const data = await res.json();
      if (!data?.length) throw new Error("Adresse introuvable");
      return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), label: data[0].display_name };
    }

    async function suggestions(query) {
      if (!query || query.trim().length < 3) return [];
      try {
        const url = new URL("https://nominatim.openstreetmap.org/search");
        url.searchParams.set("q", query); url.searchParams.set("format", "jsonv2");
        const res = await fetch(url.toString());
        const data = await res.json();
        return (data || []).map(d => ({ label: d.display_name, lat: parseFloat(d.lat), lon: parseFloat(d.lon) }));
      } catch { return []; }
    }

    const timeToMinutes = (hhmm) => { const [h, m] = hhmm.split(/[h:]/).map(Number); return h * 60 + m; };
    const minutesToTime = (total) => {
      const h = Math.floor(Math.round(total) / 60) % 24;
      const m = Math.round(total) % 60;
      return `${String(h).padStart(2, "0")}h${String(m).padStart(2, "0")}`;
    };

    function AddressInput({ value, onChange, onPick, isGeocoded, placeholder }) {
      const [open, setOpen] = useState(false);
      const [items, setItems] = useState([]);
      const timerRef = useRef(null);

      const handleChange = (e) => {
        const v = e.target.value; onChange(v); setOpen(true);
        if (timerRef.current) clearTimeout(timerRef.current);
        timerRef.current = setTimeout(async () => { const list = await suggestions(v); setItems(list); }, 400);
      };

      return (
        <div style={{ position: "relative" }}>
          <div style={{ display: 'flex', alignItems: 'center' }}>
            <input type="text" value={value} onChange={handleChange} placeholder={placeholder} style={{ marginBottom: 0 }} />
            <span className={`status-badge ${isGeocoded ? 'status-ok' : 'status-pending'}`}>{isGeocoded ? 'OK' : 'GPS ?'}</span>
          </div>
          {open && items.length > 0 && (
            <div style={{ position: "absolute", zIndex: 1000, left: 0, right: 0, background: "#fff", border: "1px solid #ddd", maxHeight: 200, overflowY: "auto", borderRadius: 12, boxShadow: '0 10px 20px rgba(0,0,0,0.1)', marginTop: '5px' }}>
              {items.map((it, idx) => (
                <div key={idx} onClick={() => { onChange(it.label); onPick(it); setOpen(false); }} style={{ padding: "10px 15px", cursor: "pointer", borderBottom: "1px solid #f3f4f6", fontSize: '12px' }}>{it.label}</div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function LeafletMap({ points, routeGeometry }) {
      const mapRef = useRef(null);
      useEffect(() => {
        if (!mapRef.current) {
          mapRef.current = L.map("map-container").setView([47.9, 1.9], 8);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(mapRef.current);
        }
        const L_map = mapRef.current;
        L_map.eachLayer(l => { if (l instanceof L.Marker || l instanceof L.Polyline) L_map.removeLayer(l); });
        const activePoints = points.filter(p => p.lat);
        activePoints.forEach((p, index) => {
          const isExtremity = p.isDepot || p.isArrival || p.client === "Départ" || p.client === "Retour";
          const markerClass = isExtremity ? "map-number depot" : "map-number job";
          const icon = L.divIcon({
            className: 'map-number-icon',
            html: `<div class="${markerClass}">${isExtremity ? (p.client === "Départ" ? "D" : "R") : index}</div>`,
            iconSize: [24, 24], iconAnchor: [12, 12]
          });
          L.marker([p.lat, p.lon], { icon }).addTo(L_map).bindPopup(`<b>${p.client}</b><br/>${p.address || ''}`);
        });
        if (routeGeometry && routeGeometry.length > 0) {
          const poly = L.polyline(routeGeometry, { color: '#ff7200', weight: 5, opacity: 0.8 }).addTo(L_map);
          L_map.fitBounds(poly.getBounds(), { padding: [50, 50] });
        }
      }, [points, routeGeometry]);
      return <div id="map-container" />;
    }

    function App() {
      const savedState = JSON.parse(localStorage.getItem('rueDuStore_state') || 'null');
      const [savedToursDict, setSavedToursDict] = useState(() => JSON.parse(localStorage.getItem('rueDuStore_savedTours') || '{}'));

      const [depot, setDepot] = useState(savedState?.depot || { address: "Orléans", lat: null, lon: null });
      const [arrival, setArrival] = useState(savedState?.arrival || { address: "", lat: null, lon: null });
      const [sameAsStart, setSameAsStart] = useState(savedState?.sameAsStart ?? true);
      const [tourDate, setTourDate] = useState(savedState?.tourDate || new Date().toISOString().split('T')[0]);
      const [startTime, setStartTime] = useState(savedState?.startTime || "08h00");
      const [jobs, setJobs] = useState(savedState?.jobs || [{ id: Date.now(), client: "", email: "", address: "", duration: 60, notes: "", lat: null }]);
      const [result, setResult] = useState(savedState?.result || null);
      const [routeGeo, setRouteGeo] = useState(savedState?.routeGeo || null);
      
      const [loading, setLoading] = useState(false);
      const [draggedIdx, setDraggedIdx] = useState(null);
      const [dragOverIdx, setDragOverIdx] = useState(null);

      const [calModalOpen, setCalModalOpen] = useState(false);
      const [calModalText, setCalModalText] = useState("");
      const [calModalJob, setCalModalJob] = useState(null);

      useEffect(() => {
        const stateToSave = { depot, arrival, sameAsStart, tourDate, startTime, jobs, result, routeGeo };
        localStorage.setItem('rueDuStore_state', JSON.stringify(stateToSave));
      }, [depot, arrival, sameAsStart, tourDate, startTime, jobs, result, routeGeo]);

      const startTimes = [];
      for(let h=6; h<=10; h++) [0,15,30,45].forEach(m => startTimes.push(`${String(h).padStart(2,'0')}h${String(m).padStart(2,'0')}`));

      const handleSaveAs = () => {
        const name = window.prompt("Nom de la sauvegarde :");
        if (!name) return;
        const stateToSave = { depot, arrival, sameAsStart, tourDate, startTime, jobs, result, routeGeo };
        const newDict = { ...savedToursDict, [name]: stateToSave };
        setSavedToursDict(newDict);
        localStorage.setItem('rueDuStore_savedTours', JSON.stringify(newDict));
        alert("Enregistré.");
      };

      const handleLoadTour = (e) => {
        const name = e.target.value;
        if (!name) return;
        const data = savedToursDict[name];
        if (data) {
          setDepot(data.depot); setArrival(data.arrival); setSameAsStart(data.sameAsStart);
          setTourDate(data.tourDate); setStartTime(data.startTime); setJobs(data.jobs);
          setResult(data.result); setRouteGeo(data.routeGeo);
        }
        e.target.value = ""; 
      };

      const resetTour = () => {
        if (window.confirm("Tout effacer ?")) {
          localStorage.removeItem('rueDuStore_state');
          window.location.reload(); 
        }
      };

      const updateTimesAndRoute = async (currentOrder) => {
        const allItems = [{...depot, isDepot:true, client:"Départ"}, ...currentOrder];
        const returnPoint = sameAsStart ? depot : arrival;
        if (!allItems[allItems.length-1].isArrival) allItems.push({...returnPoint, isDepot:true, isArrival:true, client:"Retour"});

        const coords = allItems.filter(p => p.lat).map(c => `${c.lon},${c.lat}`).join(";");
        const routeRes = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson&annotations=duration`);
        const routeData = await routeRes.json();

        let currentTime = timeToMinutes(startTime);
        let legIndex = 0;
        const durations = routeData.routes[0].legs.map(l => (l.duration / 60) * 1.10); 
        
        const newPlan = [];
        for (let i = 1; i < allItems.length; i++) {
          const currentItem = allItems[i];
          if (currentItem.isLunch) {
            const buffer = currentItem.eatOnSite ? 0 : 15;
            const arriveLunch = currentTime + buffer;
            const dur = currentItem.duration || 0;
            newPlan.push({ ...currentItem, arrive: minutesToTime(arriveLunch), depart: minutesToTime(arriveLunch + dur) });
            currentTime = arriveLunch + dur + buffer;
          } else {
            const travel = durations[legIndex] || 0;
            const arriveMin = currentTime + travel;
            const dur = currentItem.duration || 0;
            newPlan.push({ ...currentItem, arrive: minutesToTime(arriveMin), depart: minutesToTime(arriveMin + dur) });
            currentTime = arriveMin + dur;
            legIndex++;
          }
        }
        setResult({ plan: newPlan });
        setRouteGeo(routeData.routes[0].geometry.coordinates.map(c => [c[1], c[0]]));
      };

      const computePlan = async () => {
        setLoading(true);
        try {
          const all = [...jobs];
          for (let item of all) { if (!item.lat && item.address) { const g = await geocode(item.address); item.lat = g.lat; item.lon = g.lon; await sleep(400); } }
          if (!depot.lat) { const g = await geocode(depot.address); depot.lat = g.lat; depot.lon = g.lon; }
          if (!sameAsStart && !arrival.lat) { const g = await geocode(arrival.address); arrival.lat = g.lat; arrival.lon = g.lon; }
          
          let current = depot, unvisited = [...all], ordered = [];
          while(unvisited.length) {
            unvisited.sort((a,b) => (Math.pow(a.lat-current.lat,2)+Math.pow(a.lon-current.lon,2)) - (Math.pow(b.lat-current.lat,2)+Math.pow(b.lon-current.lon,2)));
            current = unvisited.shift(); ordered.push(current);
          }
          await updateTimesAndRoute(ordered);
        } catch (e) { alert(e.message); }
        setLoading(false);
      };

      const addLunch = () => {
        const lunch = { id: 'lunch-' + Date.now(), client: "PAUSE DÉJEUNER", isLunch: true, eatOnSite: false, duration: 60, address: "Sur place", lat: null, lon: null };
        const newPlan = [...result.plan];
        newPlan.splice(Math.max(0, newPlan.length - 1), 0, lunch);
        updateTimesAndRoute(newPlan.filter(p => !p.isArrival));
      };

      const handleDragStart = (e, idx) => { setDraggedIdx(idx); e.dataTransfer.effectAllowed = "move"; };
      const handleDragOver = (e, idx) => { e.preventDefault(); if (dragOverIdx !== idx) setDragOverIdx(idx); };
      const handleDragLeave = () => setDragOverIdx(null);
      const handleDrop = (idx) => {
        setDragOverIdx(null); if (draggedIdx === null || draggedIdx === idx) return;
        const newOrder = [...result.plan.filter(p => !p.isArrival)];
        const item = newOrder.splice(draggedIdx, 1)[0];
        newOrder.splice(idx, 0, item);
        updateTimesAndRoute(newOrder);
        setDraggedIdx(null);
      };

      const sendEmail = (p) => {
        const d = new Date(tourDate).toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        const subject = encodeURIComponent(`Confirmation d'intervention Rue du Store - ${d}`);
        const body = encodeURIComponent(`Bonjour,\n\nPassage techniciens prévu le ${d} à partir de ${p.arrive} pour ${p.notes || 'pose'}.\n\nCordialement.`);
        window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${p.email}&su=${subject}&body=${body}`, '_blank');
      };

      const openCalendarModal = (p) => {
        setCalModalText(`Notes : ${p.notes || 'Aucune'}\nClient : ${p.client}`);
        setCalModalJob(p); setCalModalOpen(true);
      };

      const confirmAddToCalendar = () => {
        if (!calModalJob) return; const p = calModalJob; const [y, m, d] = tourDate.split('-');
        const dates = `${y}${m}${d}T${p.arrive.replace('h','')}00/${y}${m}${d}T${p.depart.replace('h','')}00`;
        const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('Intervention - '+p.client)}&dates=${dates}&details=${encodeURIComponent(calModalText)}&location=${encodeURIComponent(p.address || '')}`;
        window.open(url, '_blank'); setCalModalOpen(false);
      };

      return (
        <div style={{ maxWidth: 1000, margin: "20px auto", padding: "0 20px" }}>
          
          <div className="no-print card">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 25 }}>
              <h2>Gestion des Tournées</h2>
              <div style={{ display: 'flex', gap: 10 }}>
                <select onChange={handleLoadTour} style={{ width: 'auto', marginBottom: 0 }}>
                  <option value="">📂 Ouvrir...</option>
                  {Object.keys(savedToursDict).map(n => <option key={n} value={n}>{n}</option>)}
                </select>
                <button className="btn btn-primary" onClick={handleSaveAs}>💾 Sauver</button>
                <button className="btn btn-secondary" onClick={resetTour}>🗑️ New</button>
              </div>
            </div>
            <div className="rds-divider"></div>
            
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 20 }}>
              <div><label>Date Tournée</label><input type="date" value={tourDate} onChange={e => setTourDate(e.target.value)} /></div>
              <div><label>Départ à...</label>
                <select value={startTime} onChange={e => setStartTime(e.target.value)}>
                  {startTimes.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div><label>Lieu de Départ</label><AddressInput placeholder="Ville ou adresse" value={depot.address} isGeocoded={!!depot.lat} onChange={v => setDepot({...depot, address: v, lat: null})} onPick={s => setDepot({...depot, lat: s.lat, lon: s.lon, address: s.label})} /></div>
            </div>

            <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '15px 0' }}>
               <input type="checkbox" id="ret" checked={sameAsStart} onChange={e => setSameAsStart(e.target.checked)} style={{ width: 'auto', margin: 0 }} />
               <label htmlFor="ret" style={{ margin: 0, fontSize: 13 }}>Retour au dépôt</label>
            </div>
            {!sameAsStart && <AddressInput placeholder="Adresse retour" value={arrival.address} isGeocoded={!!arrival.lat} onChange={v => setArrival({...arrival, address: v, lat: null})} onPick={s => setArrival({...arrival, lat: s.lat, lon: s.lon, address: s.label})} />}

            <div style={{ marginTop: 30 }}>
              <h3>Chantiers prévus</h3>
              <div className="rds-divider"></div>
              {jobs.map((j) => (
                <div key={j.id} style={{ padding: 20, border: '1px solid #f0f0f0', borderRadius: 16, marginBottom: 15, background: '#fafafa' }}>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 15 }}>
                    <div><label>Client</label><input type="text" placeholder="Nom" value={j.client} onChange={e => setJobs(jobs.map(x => x.id === j.id ? {...x, client: e.target.value} : x))} /></div>
                    <div><label>Email</label><input type="text" placeholder="Email" value={j.email} onChange={e => setJobs(jobs.map(x => x.id === j.id ? {...x, email: e.target.value} : x))} /></div>
                  </div>
                  <label>Adresse d'intervention</label>
                  <AddressInput placeholder="Adresse complète" value={j.address} isGeocoded={!!j.lat} onChange={v => setJobs(jobs.map(x => x.id === j.id ? {...x, address: v, lat: null} : x))} onPick={s => setJobs(jobs.map(x => x.id === j.id ? {...x, lat: s.lat, lon: s.lon, address: s.label} : x))} />
                  <div style={{ display: 'grid', gridTemplateColumns: '100px 1fr auto', gap: 15, alignItems: 'end' }}>
                    <div><label>Durée</label><select value={j.duration} onChange={e => setJobs(jobs.map(x => x.id === j.id ? {...x, duration: parseInt(e.target.value)} : x))}>
                      {[30, 60, 90, 120, 180, 240, 300].map(m => <option key={m} value={m}>{Math.floor(m/60)}h{String(m%60).padStart(2,'0')}</option>)}
